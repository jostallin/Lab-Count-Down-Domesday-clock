<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Doomsday Clock - Hours Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap');
        
        :root {
            --bg-color: #050505;
            --accent-color: #ff3e3e;
            --bonus-color: #3b82f6;
            --text-color: #e0e0e0;
            --intensity: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            transition: background-color 0.5s ease;
        }

        .digital-font { font-family: 'Orbitron', sans-serif; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }

        .doom-shake { animation: shake calc(0.5s / var(--intensity, 1)) infinite; }
        .doom-pulse { animation: pulse 2s infinite; }
        .doom-flicker { animation: flicker 0.1s infinite; }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(255, 62, 62, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0); }
        }

        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .glow-red { text-shadow: 0 0 30px rgba(255, 62, 62, 0.6); }
        .glow-blue { text-shadow: 0 0 30px rgba(59, 130, 246, 0.6); }

        .btn-primary { background-color: var(--accent-color); transition: all 0.2s; }
        .btn-primary:hover { background-color: #ff1a1a; transform: translateY(-2px); }
        .btn-secondary { background-color: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.2s; }

        input, select {
            background: rgba(0,0,0,0.5) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
        }

        #doom-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(circle, transparent 40%, rgba(255,0,0,0.15) 100%);
            z-index: 50; display: none;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 md:p-12">
    <div id="doom-overlay"></div>

    <!-- LOGIN MODAL -->
    <div id="login-view" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-md p-6">
        <div class="w-full max-w-sm glass-panel p-8 text-center space-y-6">
            <h2 class="text-xl font-bold uppercase tracking-widest text-red-500">Admin Access Required</h2>
            <input type="password" id="login-pass" placeholder="Enter Admin Password" class="w-full p-4 rounded-xl text-center">
            <div class="flex flex-col gap-2">
                <button onclick="checkLogin()" class="btn-primary w-full py-3 rounded-xl font-bold uppercase tracking-widest">Unlock Settings</button>
                <button onclick="hideLogin()" class="text-xs text-white/40 uppercase mt-2">Back to Clock</button>
            </div>
            <p id="login-error" class="text-red-500 text-xs hidden uppercase">Incorrect Password</p>
        </div>
    </div>

    <!-- SETUP VIEW -->
    <div id="setup-view" class="w-full max-w-3xl glass-panel p-8 space-y-6 my-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-white/10 pb-4 gap-4">
            <h1 class="text-3xl font-bold tracking-tight">Lab Clock Setup</h1>
            <div class="flex gap-2">
                <button onclick="exportConfig()" class="btn-secondary px-3 py-1 rounded text-xs uppercase tracking-widest text-white/60">Save Config</button>
                <button onclick="document.getElementById('import-input').click()" class="btn-secondary px-3 py-1 rounded text-xs uppercase tracking-widest text-white/60">Load Config</button>
                <input type="file" id="import-input" class="hidden" accept=".json" onchange="importConfig(event)">
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium mb-2 text-red-400">Machine Deadline (Final Hour)</label>
                <input type="datetime-local" id="machine-deadline" class="w-full p-3 rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2 text-blue-400">Semester End</label>
                <input type="datetime-local" id="semester-deadline" class="w-full p-3 rounded-lg">
            </div>
        </div>

        <div class="p-4 bg-white/5 rounded-xl border border-white/10">
            <label class="block text-xs font-bold uppercase text-white/40 mb-2">Security: Control Panel Password</label>
            <input type="text" id="admin-pass" placeholder="Set password for settings" class="w-full p-2 rounded-lg text-sm">
            <p class="text-[10px] mt-2 text-white/30 italic">Note: This is saved in your JSON file. Keep it simple.</p>
        </div>

        <div class="space-y-4">
            <h2 class="text-xl font-semibold">Weekly Schedule</h2>
            <div id="schedule-container" class="space-y-2 max-h-64 overflow-y-auto pr-2 custom-scrollbar"></div>
        </div>

        <button onclick="startClock()" class="w-full btn-primary py-4 rounded-xl font-bold text-lg uppercase tracking-widest mt-4">
            Activate Doomsday Logic
        </button>
    </div>

    <!-- COUNTDOWN VIEW -->
    <div id="clock-view" class="hidden w-full max-w-5xl text-center space-y-10 my-auto py-12">
        <div class="space-y-2">
            <h1 id="main-title" class="text-2xl md:text-3xl font-bold uppercase tracking-[0.3em] text-white/30 transition-all">Productive Time Remaining</h1>
            <div id="current-status" class="text-red-500 font-bold tracking-widest uppercase">Analyzing...</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass-panel p-10 relative overflow-hidden" id="class-panel">
                <div class="absolute top-0 left-0 w-1 h-full bg-red-600"></div>
                <div class="text-[0.6rem] uppercase tracking-widest mb-4 opacity-60 text-red-400">Scheduled Class Lab Hours</div>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="class-hours" class="text-8xl md:text-9xl font-bold digital-font glow-red text-red-500">00</span>
                    <span class="text-2xl digital-font text-red-900">HRS</span>
                </div>
            </div>
            <div class="glass-panel p-10 relative overflow-hidden" id="bonus-panel">
                <div class="absolute top-0 left-0 w-1 h-full bg-blue-600"></div>
                <div class="text-[0.6rem] uppercase tracking-widest mb-4 opacity-60 text-blue-400">Potential Bonus Hours</div>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="bonus-hours" class="text-8xl md:text-9xl font-bold digital-font glow-blue text-blue-500">00</span>
                    <span class="text-2xl digital-font text-blue-900">HRS</span>
                </div>
            </div>
        </div>

        <div class="flex flex-wrap justify-center gap-4">
            <div class="glass-panel py-3 px-6 text-sm flex gap-4 items-center">
                <span id="real-time-diff" class="font-mono text-white/80">0d 0h 0m 0s</span>
            </div>
            <div class="glass-panel py-3 px-6 text-sm flex gap-4 items-center">
                <span id="current-class" class="font-bold text-yellow-500 uppercase">Standby</span>
            </div>
        </div>

        <button onclick="requestAccess()" class="px-6 py-2 border border-white/10 rounded-full text-white/20 hover:text-white/60 text-xs transition-all uppercase tracking-widest">
            Unlock Admin Panel
        </button>
    </div>

    <script>
        const daysOfWeek = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        let config = {
            password: '',
            machineDeadline: null,
            semesterDeadline: null,
            schedule: daysOfWeek.map(day => ({ day, active: false, name: '', start: '08:00', end: '12:00', type: 'class' }))
        };

        function init() {
            const container = document.getElementById('schedule-container');
            container.innerHTML = '';
            config.schedule.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'grid grid-cols-12 gap-3 items-center text-sm bg-white/5 p-3 rounded-xl border border-white/5';
                div.innerHTML = `
                    <div class="col-span-2 flex items-center gap-3">
                        <input type="checkbox" onchange="updateSchedule(${index}, 'active', this.checked)" ${item.active ? 'checked' : ''}>
                        <span>${item.day.slice(0,3)}</span>
                    </div>
                    <input type="text" placeholder="Class Name" class="col-span-3 p-2 rounded-lg text-xs" onchange="updateSchedule(${index}, 'name', this.value)" value="${item.name}">
                    <div class="col-span-4 flex items-center gap-1">
                        <input type="time" class="w-full p-2 rounded-lg text-xs" onchange="updateSchedule(${index}, 'start', this.value)" value="${item.start}">
                        <input type="time" class="w-full p-2 rounded-lg text-xs" onchange="updateSchedule(${index}, 'end', this.value)" value="${item.end}">
                    </div>
                    <select class="col-span-3 p-2 rounded-lg text-xs" onchange="updateSchedule(${index}, 'type', this.value)">
                        <option value="class" ${item.type === 'class' ? 'selected' : ''}>📚 Class</option>
                        <option value="bonus" ${item.type === 'bonus' ? 'selected' : ''}>⭐ Bonus</option>
                    </select>`;
                container.appendChild(div);
            });
            document.getElementById('admin-pass').value = config.password;
        }

        function updateSchedule(index, field, value) { config.schedule[index][field] = value; }

        function exportConfig() {
            config.machineDeadline = document.getElementById('machine-deadline').value;
            config.semesterDeadline = document.getElementById('semester-deadline').value;
            config.password = document.getElementById('admin-pass').value;
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(config));
            const a = document.createElement('a'); a.href = dataStr; a.download = "lab_clock_config.json"; a.click();
        }

        function importConfig(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try { config = JSON.parse(e.target.result); init(); } catch { alert("Invalid file"); }
            };
            reader.readAsText(file);
        }

        function requestAccess() {
            if (!config.password || config.password.trim() === "") {
                toggleSetup();
            } else {
                document.getElementById('login-view').classList.remove('hidden');
                document.getElementById('login-pass').focus();
            }
        }

        function checkLogin() {
            const pass = document.getElementById('login-pass').value;
            if (pass === config.password) {
                document.getElementById('login-pass').value = '';
                document.getElementById('login-error').classList.add('hidden');
                hideLogin();
                toggleSetup();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function hideLogin() { document.getElementById('login-view').classList.add('hidden'); }

        function toggleSetup() {
            document.getElementById('setup-view').classList.remove('hidden');
            document.getElementById('clock-view').classList.add('hidden');
            document.body.style.setProperty('--intensity', '0');
            document.body.classList.remove('doom-shake');
            window.scrollTo(0,0);
        }

        function startClock() {
            config.password = document.getElementById('admin-pass').value;
            config.machineDeadline = new Date(document.getElementById('machine-deadline').value);
            config.semesterDeadline = new Date(document.getElementById('semester-deadline').value);
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('clock-view').classList.remove('hidden');
            window.scrollTo(0,0);
            if (!window.clockTimer) window.clockTimer = setInterval(updateDisplay, 1000);
            updateDisplay();
        }

        function calculateRemainingHours(targetDeadline, typeFilter) {
            const now = new Date(); if (now >= targetDeadline) return 0;
            let totalMinutes = 0; let currentLoop = new Date(now);
            while (currentLoop <= targetDeadline) {
                const dayConfigs = config.schedule.filter(s => s.active && s.day === daysOfWeek[currentLoop.getDay()] && s.type === typeFilter);
                dayConfigs.forEach(session => {
                    const sStart = new Date(currentLoop); const [sh, sm] = session.start.split(':'); sStart.setHours(sh, sm, 0, 0);
                    const sEnd = new Date(currentLoop); const [eh, em] = session.end.split(':'); sEnd.setHours(eh, em, 0, 0);
                    let actualEnd = sEnd > targetDeadline ? targetDeadline : sEnd;
                    let actualStart = sStart < now ? now : sStart;
                    if (actualEnd > actualStart) totalMinutes += (actualEnd - actualStart) / (1000 * 60);
                });
                currentLoop.setDate(currentLoop.getDate() + 1); currentLoop.setHours(0, 0, 0, 0);
            }
            return (totalMinutes / 60).toFixed(1);
        }

        function updateDisplay() {
            const now = new Date(); const machineTarget = new Date(config.machineDeadline);
            const statusEl = document.getElementById('current-status');
            const classH = parseFloat(calculateRemainingHours(machineTarget, 'class'));
            const bonusH = parseFloat(calculateRemainingHours(machineTarget, 'bonus'));

            if (now >= machineTarget) {
                statusEl.innerText = "CRITICAL FAILURE - DEADLINE EXPIRED";
                statusEl.className = "text-red-600 font-black tracking-widest uppercase text-3xl doom-flicker";
                document.body.style.setProperty('--intensity', '10');
                document.body.classList.add('doom-shake');
                return;
            }

            document.getElementById('class-hours').innerText = classH.toFixed(1);
            document.getElementById('bonus-hours').innerText = bonusH.toFixed(1);

            const totalHours = classH + bonusH;
            const mainTitle = document.getElementById('main-title');
            if (totalHours < 10) {
                document.body.style.setProperty('--intensity', '1');
                document.body.classList.add('doom-shake');
                document.getElementById('doom-overlay').style.display = 'block';
                mainTitle.innerText = "TIME IS RUNNING OUT";
            } else {
                document.body.classList.remove('doom-shake');
                document.getElementById('doom-overlay').style.display = 'none';
            }

            const diff = machineTarget - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('real-time-diff').innerText = `${d}d ${h}h ${m}m ${s}s`;

            const activeLab = config.schedule.find(item => {
                const t = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                return item.active && item.day === daysOfWeek[now.getDay()] && t >= item.start && t <= item.end;
            });

            if (activeLab) {
                statusEl.innerText = activeLab.type === 'bonus' ? "BONUS LAB ACTIVE" : "CLASS IN SESSION";
                statusEl.className = "text-green-500 font-bold animate-pulse uppercase tracking-widest";
                document.getElementById('current-class').innerText = activeLab.name;
            } else {
                statusEl.innerText = "STANDBY MODE";
                statusEl.className = "text-white/20 font-bold tracking-widest";
                document.getElementById('current-class').innerText = "No Active Session";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
